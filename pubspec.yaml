name: kpos
description: "fast food point of sale"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
 sdk: '>=3.9.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
      sdk: flutter

  connectivity_plus: ^6.0.0
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.20.2
  sqflite_common_ffi: ^2.3.2 # Good for windows development if needed, but standard sqflite usually relies on platform implementation.
  image_picker: ^1.2.1
  fl_chart: ^0.66.2
  syncfusion_flutter_charts: ^32.1.22
  image: ^4.0.0
  screenshot: ^3.0.0
  flutter_localization: ^0.3.3
  flutter_slidable: ^4.0.3
  grouped_list: ^6.0.0
  postgres: ^3.5.9
  shared_preferences: ^2.5.4
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  device_info_plus: ^11.3.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1


  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icon/app_icon.ico" # مسار صورتك الأصلية
